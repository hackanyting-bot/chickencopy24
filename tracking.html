<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHICKEN COPY - Tracking & Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #d32f2f;
            --success-color: #2e7d32;
            --delivery-color: #0288d1;
            --warning-color: #ef6c00;
            --bg-color: #f4f4f4;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 480px; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { color: var(--primary-color); margin-bottom: 20px; font-size: 1.5em; }

        /* มอนิเตอร์คิวรวม */
        .queue-monitor {
            background: #fff3e0;
            border: 2px solid #ffcc80;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .queue-header {
            font-size: 1.2em;
            color: #d32f2f;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 2px dashed #ffcc80;
            padding-bottom: 10px;
        }
        .queue-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 5px;
            border-bottom: 1px solid #ffe0b2;
            font-size: 0.95em;
        }
        .queue-row:last-child { border-bottom: none; }
        .q-number { font-weight: bold; color: #333; }
        .q-status-cooking { color: var(--warning-color); font-weight: bold; }
        .q-status-done { color: var(--success-color); font-weight: bold; }

        /* รายการออเดอร์ของฉัน */
        .order-item {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            text-align: left;
            border-left: 8px solid var(--warning-color);
            position: relative;
        }
        .order-item.status-done { border-left-color: var(--success-color); }
        .order-item.status-delivery { border-left-color: var(--delivery-color); }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .badge-cooking { background: #fff3e0; color: var(--warning-color); }
        .badge-done { background: #e8f5e9; color: var(--success-color); }
        .badge-out { background: #e1f5fe; color: var(--delivery-color); }

        .customer-info { font-size: 0.9em; color: #666; margin-bottom: 5px; }
        .order-details { font-size: 1em; color: #333; font-weight: 400; line-height: 1.4; }

        /* Admin UI */
        #admin-ui { display: none; width: 100%; border-top: 2px dashed #ccc; padding-top: 20px; margin-top: 20px; }
        
        .admin-actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            font-family: 'Kanit'; font-weight: 600; cursor: pointer; color: white;
            font-size: 0.9em;
        }

        .admin-card {
            background: #fff; padding: 15px; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid #ddd; text-align: left;
        }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white; font-family: 'Kanit'; font-weight: 600; cursor: pointer;
        }
        .btn-cooking { background: var(--warning-color); }
        .btn-done { background: var(--success-color); }

        .back-link { 
            text-decoration: none; color: white; background: #333; 
            padding: 12px; border-radius: 10px; display: block; 
            margin-top: 15px; font-weight: bold; text-align: center;
        }

        #secret-trigger {
            margin-top: 60px; color: #ddd; font-size: 0.7em;
            padding: 20px; user-select: none; -webkit-user-select: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="queue-monitor">
        <div class="queue-header">
            📊 คิวหน้าร้านตอนนี้<br>
            <span style="font-size: 0.8em; color: #555;">(รอคิวอยู่: <span id="queue-count">0</span> คิว)</span>
        </div>
        <div id="public-queue-list">
            <div style="text-align:center; color:#888; padding: 10px;">กำลังโหลดคิว...</div>
        </div>
    </div>

    <div id="customer-ui" class="card">
        <h2>📍 ติดตามออเดอร์ ไก่ก๊อปปี้</h2>
        <div id="order-list">กำลังตรวจสอบออเดอร์ของคุณ...</div>
        <a href="index.html" class="back-link">← กลับไปหน้าสั่งอาหาร</a>
    </div>

    <div id="admin-ui">
        <h2 style="text-align:center; color:#333; margin-bottom: 10px;">👨‍🍳 ระบบหลังบ้าน</h2>
        
        <div class="admin-actions">
            <button class="btn-action" style="background:#ff9800;" onclick="clearDoneOrders()">🧹 ล้างที่เสร็จแล้ว</button>
            <button class="btn-action" style="background:#d32f2f;" onclick="clearAllOrders()">🗑️ ล้างทั้งหมด</button>
        </div>

        <div id="admin-order-list"></div>
    </div>
</div>

<div id="secret-trigger">CHICKEN COPY SYSTEM v1.6</div>

<script>
    const SUPABASE_URL = 'https://bnovmyobcthvvtlgjzbm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJub3ZteW9iY3RodnZ0bGdqemJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjc2NDksImV4cCI6MjA5MTk0MzY0OX0.zjjZXW8mU4wN2OQwqZjD-IWL1PwZp7dM3oVsR5EwcCk';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const myName = localStorage.getItem('customerName') || "";
    const myPhone = localStorage.getItem('customerPhone') || "";

    // ปิดบังชื่อลูกค้าในคิวรวมเพื่อความส่วนตัว
    function maskName(name) {
        if(!name) return "ลูกค้า";
        if(name.length <= 2) return name + "***";
        return name.substring(0, 2) + "***";
    }

    function maskPhone(phone) {
        if(!phone) return "---";
        if(phone.length < 10) return phone;
        return phone.substring(0, 3) + "XXX XXX";
    }

    async function refreshOrders() {
        // ดึงข้อมูลเรียงตามเวลาเก่าไปใหม่ (คิวแรกอยู่บนสุด)
        const { data: orders, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: true });
        if (error) { console.error(error); return; }

        const now = new Date().getTime();

        // กรองออเดอร์ที่ยังแอคทีฟ (ถ้าเสร็จแล้วเกิน 1 ชม. ให้ซ่อน)
        const activeOrders = orders.filter(o => {
            if (o.status === 'done') {
                const orderTime = new Date(o.created_at).getTime();
                if (now - orderTime > 3600000) return false;
            }
            return true;
        });

        // ----------------------------------------------------
        // 1. จัดการจอมอนิเตอร์คิวรวม (Public Queue)
        // ----------------------------------------------------
        let cookingCount = 0;
        let queueHTML = "";

        if (activeOrders.length === 0) {
            queueHTML = '<div style="text-align:center; color:#999; padding:10px;">ตอนนี้คิวว่าง ลุยสั่งได้เลยจ้า!</div>';
        } else {
            activeOrders.forEach((o, index) => {
                if (o.status === 'cooking') cookingCount++;
                
                const statusIcon = o.status === 'done' ? '✅ เสร็จแล้ว' : '👨‍🍳 กำลังทำ';
                const statusClass = o.status === 'done' ? 'q-status-done' : 'q-status-cooking';
                
                queueHTML += `
                    <div class="queue-row">
                        <div class="q-number">คิวที่ ${index + 1} - คุณ ${maskName(o.customer_name)}</div>
                        <div class="${statusClass}">${statusIcon}</div>
                    </div>
                `;
            });
        }
        document.getElementById('queue-count').innerText = cookingCount;
        document.getElementById('public-queue-list').innerHTML = queueHTML;

        // ----------------------------------------------------
        // 2. จัดการรายการออเดอร์ของฉัน (My Orders)
        // ----------------------------------------------------
        // เอาออเดอร์ที่แอคทีฟมาเรียงกลับด้าน เพื่อให้บิลล่าสุดของฉันอยู่บนสุด
        const myOrders = activeOrders.filter(o => (myName !== "" && o.customer_name === myName) || (myPhone !== "" && o.customer_phone === myPhone)).reverse();

        const listDiv = document.getElementById('order-list');
        
        if (myOrders.length === 0) {
            listDiv.innerHTML = `<p style="color:#999;">ไม่พบออเดอร์ของคุณ<br><small>กรุณาสั่งอาหารก่อนนะครับ</small></p>`;
        } else {
            listDiv.innerHTML = myOrders.map(o => {
                let statusText = "👨‍🍳 กำลังเตรียมอาหาร";
                let statusClass = "badge-cooking";
                let itemClass = "";

                if (o.status === 'done') {
                    if (o.delivery_type && o.delivery_type.includes('ส่ง')) {
                        statusText = "🛵 กำลังออกไปส่ง";
                        statusClass = "badge-out";
                        itemClass = "status-delivery";
                    } else {
                        statusText = "✅ อาหารเสร็จแล้ว (มารับได้เลย)";
                        statusClass = "badge-done";
                        itemClass = "status-done";
                    }
                }

                return `
                    <div class="order-item ${itemClass}">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        <div class="customer-info">คุณ ${o.customer_name} (${maskPhone(o.customer_phone)})</div>
                        <div class="order-details">${o.order_details}</div>
                    </div>
                `;
            }).join('');
        }

        // ----------------------------------------------------
        // 3. จัดการฝั่ง Admin (ถ้าเปิดใช้งาน)
        // ----------------------------------------------------
        if (document.getElementById('admin-ui').style.display === 'block') {
            const adminList = document.getElementById('admin-order-list');
            // แอดมินดูแบบเรียงบิลใหม่ล่าสุดอยู่บน
            const adminOrders = [...activeOrders].reverse();

            if(adminOrders.length === 0) {
                adminList.innerHTML = `<p style="text-align:center; color:#888;">ว่างเปล่า ไม่มีออเดอร์ค้าง</p>`;
            } else {
                adminList.innerHTML = adminOrders.map(o => `
                    <div class="admin-card">
                        <strong>${o.customer_name}</strong> - ${o.customer_phone || 'ไม่มีเบอร์'}<br>
                        <small>รับของ: ${o.delivery_type || 'ไม่ระบุ'} | สถานะ: ${o.status === 'done' ? '✅ เสร็จ' : '👨‍🍳 ทำอาหาร'}</small><br>
                        <div style="margin-top:5px; margin-bottom:10px;">${o.order_details}</div>
                        <div class="btn-group">
                            <button class="btn btn-cooking" onclick="updateStatus('${o.id}', 'cooking')">กำลังทำ</button>
                            <button class="btn btn-done" onclick="updateStatus('${o.id}', 'done')">เสร็จแล้ว</button>
                        </div>
                    </div>
                `).join('');
            }
        }
    }

    async function updateStatus(id, newStatus) {
        try {
            const { error } = await _supabase.from('orders').update({ status: newStatus }).eq('id', id);
            if (error) throw error;
            refreshOrders();
        } catch(e) { alert("Error: " + e.message); }
    }

    async function clearDoneOrders() {
        if(!confirm('ยืนยันลบออเดอร์ที่ "เสร็จแล้ว" ทั้งหมดใช่ไหม? (คิวจะถูกรีเซ็ตตามบิลที่เหลือ)')) return;
        try {
            const { error } = await _supabase.from('orders').delete().eq('status', 'done');
            if (error) throw error;
            refreshOrders();
        } catch(e) { alert("ลบไม่ได้: " + e.message); }
    }

    async function clearAllOrders() {
        if(!confirm('⚠️ ยืนยันการ "ล้างออเดอร์ทั้งหมด" ในระบบ? (ลบจริง กู้ไม่ได้นะ)')) return;
        try {
            const { data, error: fetchError } = await _supabase.from('orders').select('id');
            if (fetchError) throw fetchError;
            if (data && data.length > 0) {
                const ids = data.map(o => o.id);
                const { error: deleteError } = await _supabase.from('orders').delete().in('id', ids);
                if (deleteError) throw deleteError;
            }
            refreshOrders();
        } catch(e) { alert("ลบไม่ได้: " + e.message); }
    }

    // Real-time Update ให้คิวเลื่อนทันทีที่ระบบมีการเปลี่ยนแปลง
    _supabase.channel('orders-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, refreshOrders).subscribe();

    // Admin Login (กดค้างที่เวอร์ชั่นด้านล่าง)
    let timer;
    const trigger = document.getElementById('secret-trigger');

    function handleStart() {
        timer = setTimeout(() => {
            if (prompt("ระบุรหัสพนักงาน:") === "0420") {
                document.getElementById('admin-ui').style.display = 'block';
                refreshOrders();
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }, 2000);
    }
    function handleEnd() { clearTimeout(timer); }

    trigger.addEventListener('touchstart', handleStart);
    trigger.addEventListener('touchend', handleEnd);
    trigger.addEventListener('mousedown', handleStart);
    trigger.addEventListener('mouseup', handleEnd);

    refreshOrders();
</script>

</body>
</html>
