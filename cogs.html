<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken COGS - คำนวณต้นทุนร้านข้าวยำไก่</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border-left: 5px solid #d32f2f; }
        .header-bar h1 { margin: 0; color: #d32f2f; font-size: 1.8em; }
        .btn-group { display: flex; gap: 10px; }
        button { font-family: 'Kanit', sans-serif; padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-save { background: #d32f2f; color: white; }
        .btn-report { background: #0088cc; color: white; }
        .btn-back { background: #607d8b; color: white; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 25px; }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; color: #5d4037; font-size: 1.3em; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; color: #666; font-size: 0.9em; }
        td { padding: 10px; border-bottom: 1px solid #f1f1f1; }
        
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .recipe-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 15px; padding: 15px; position: relative; }
        .recipe-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .recipe-footer { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ddd; display: flex; justify-content: space-between; font-weight: bold; }
        
        .profit-good { color: #2e7d32; }
        .profit-bad { color: #d32f2f; }
        
        .btn-add { background: #4caf50; color: white; width: 100%; margin-top: 10px; }
        .btn-del { background: #ffebee; color: #d32f2f; padding: 5px 10px; border-radius: 5px; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: flex; justify-content: center; align-items: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">กำลังดึงข้อมูลจาก Supabase ร้านไก่...</div>

<div class="header-bar">
    <h1>🍗 Chicken COGS System</h1>
    <div class="btn-group">
        <button class="btn-back" onclick="window.location.href='index.html'">กลับหน้าขาย</button>
        <button class="btn-report" onclick="sendTelegramReport()">ส่งรายงานเข้า TG</button>
        <button class="btn-save" onclick="saveData()">บันทึกข้อมูล</button>
    </div>
</div>

<div class="card">
    <h2>📦 1. ฐานข้อมูลวัตถุดิบ (Raw Materials)</h2>
    <table id="materialsTable">
        <thead>
            <tr>
                <th>ชื่อวัตถุดิบ</th>
                <th>ราคาที่ซื้อ (บาท)</th>
                <th>ปริมาณที่ได้ (กรัม/ชิ้น)</th>
                <th>ราคาต่อหน่วย</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="materialsBody"></tbody>
    </table>
    <button class="btn-add" onclick="addMaterial()">+ เพิ่มวัตถุดิบใหม่</button>
</div>

<div class="card">
    <h2>🍳 2. คำนวณต้นทุนเมนู (Recipes)</h2>
    <div class="recipe-grid" id="recipesContainer"></div>
    <button class="btn-add" style="background:#d32f2f;" onclick="addRecipe()">+ สร้างสูตรเมนูใหม่</button>
</div>

<script>
    // ตั้งค่าสำหรับร้านข้าวยำไก่โดยเฉพาะ
    const SUPABASE_URL = 'https://bnovmyobcthvvtlgjzbm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_zBeScPDuzqPA-qeP5IcOQw_DXsK70TK';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const TELEGRAM_TOKEN = '7795027949:AAGsiPU4FFfoZuXKoDXLqgXlEqmBeEKwnuA';
    const CHAT_ID = '7006062970';
    const GROUP_CHAT_ID = '-1003862093556';

    let cogsData = {
        materials: [],
        recipes: []
    };

    async function loadData() {
        try {
            const { data, error } = await _supabase.from('cogs_settings').select('*').single();
            if (data && data.config_json) {
                cogsData = data.config_json;
            } else {
                // ข้อมูลเริ่มต้นสำหรับร้านไก่กรณีไม่มีใน DB
                cogsData = {
                    materials: [
                        { id: 'm1', name: 'อกไก่สด', cost: 160, qty: 1000 },
                        { id: 'm2', name: 'ข้าวหอมมะลิ (สาร)', cost: 45, qty: 1000 },
                        { id: 'm3', name: 'ซอสน้ำยำ', cost: 120, qty: 1000 }
                    ],
                    recipes: [
                        { name: 'ข้าวยำไก่แซ่บ', price: 50, ingredients: [{ matId: 'm1', usedQty: 100 }, { matId: 'm2', usedQty: 150 }] }
                    ]
                };
            }
            renderAll();
        } catch (e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function renderAll() {
        renderMaterials();
        renderRecipes();
    }

    function renderMaterials() {
        const body = document.getElementById('materialsBody');
        body.innerHTML = '';
        cogsData.materials.forEach((m, index) => {
            const unitCost = m.qty > 0 ? (m.cost / m.qty).toFixed(2) : 0;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" value="${m.name}" onchange="updateMaterial(${index}, 'name', this.value)"></td>
                <td><input type="number" value="${m.cost}" onchange="updateMaterial(${index}, 'cost', this.value)"></td>
                <td><input type="number" value="${m.qty}" onchange="updateMaterial(${index}, 'qty', this.value)"></td>
                <td><span style="color:#666">${unitCost} บาท/หน่วย</span></td>
                <td><button class="btn-del" onclick="deleteMaterial(${index})">ลบ</button></td>
            `;
            body.appendChild(row);
        });
    }

    function updateMaterial(index, field, value) {
        cogsData.materials[index][field] = field === 'name' ? value : parseFloat(value) || 0;
        renderAll();
    }

    function addMaterial() {
        cogsData.materials.push({ id: 'm' + Date.now(), name: 'วัตถุดิบใหม่', cost: 0, qty: 1 });
        renderMaterials();
    }

    function deleteMaterial(index) {
        if(confirm('ลบวัตถุดิบนี้อาจส่งผลต่อสูตรอาหารที่ใช้อยู่ ยืนยันไหม?')) {
            cogsData.materials.splice(index, 1);
            renderAll();
        }
    }

    function renderRecipes() {
        const container = document.getElementById('recipesContainer');
        container.innerHTML = '';
        
        cogsData.recipes.forEach((recipe, rIndex) => {
            let totalCost = 0;
            let ingredientsHTML = '';
            
            recipe.ingredients.forEach((ing, iIndex) => {
                const mat = cogsData.materials.find(m => m.id === ing.matId);
                const unitPrice = mat ? (mat.cost / mat.qty) : 0;
                const cost = unitPrice * ing.usedQty;
                totalCost += cost;
                
                ingredientsHTML += `
                    <tr>
                        <td>
                            <select onchange="updateIngredient(${rIndex}, ${iIndex}, 'matId', this.value)" style="width:100%; padding:5px; border-radius:5px;">
                                <option value="">เลือก...</option>
                                ${cogsData.materials.map(m => `<option value="${m.id}" ${m.id === ing.matId ? 'selected' : ''}>${m.name}</option>`).join('')}
                            </select>
                        </td>
                        <td><input type="number" value="${ing.usedQty}" style="width:60px" onchange="updateIngredient(${rIndex}, ${iIndex}, 'usedQty', this.value)"></td>
                        <td>${cost.toFixed(2)}</td>
                        <td><button onclick="deleteIngredient(${rIndex}, ${iIndex})" style="color:red; border:none; background:none; cursor:pointer;">×</button></td>
                    </tr>
                `;
            });

            const profit = recipe.price - totalCost;
            const margin = recipe.price > 0 ? ((profit / recipe.price) * 100).toFixed(1) : 0;
            const profitClass = margin >= 40 ? 'profit-good' : 'profit-bad';

            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.innerHTML = `
                <div class="recipe-header">
                    <input type="text" value="${recipe.name}" style="font-weight:bold; border:none; border-bottom:1px solid #eee;" onchange="updateRecipe(${rIndex}, 'name', this.value)">
                    <div style="display:flex; align-items:center; gap:5px;">
                        <input type="number" value="${recipe.price}" style="width:60px; color:#d32f2f; font-weight:bold;" onchange="updateRecipe(${rIndex}, 'price', this.value)"> บ.
                        <button onclick="deleteRecipe(${rIndex})" style="color:#ccc; background:none; border:none; cursor:pointer;">🗑️</button>
                    </div>
                </div>
                <div style="max-height:150px; overflow-y:auto;">
                    <table>
                        ${ingredientsHTML}
                    </table>
                    <button class="btn-add" style="background:#42a5f5; font-size:0.8em; padding:5px;" onclick="addIngredient(${rIndex})">+ เพิ่มส่วนผสม</button>
                </div>
                <div class="recipe-footer">
                    <span>ต้นทุน: ${totalCost.toFixed(2)}</span>
                    <span class="${profitClass}">กำไร: ${profit.toFixed(2)} (${margin}%)</span>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function updateRecipe(rIndex, field, value) {
        cogsData.recipes[rIndex][field] = field === 'name' ? value : parseFloat(value) || 0;
        renderRecipes();
    }

    function addRecipe() {
        cogsData.recipes.push({ name: 'เมนูใหม่', price: 50, ingredients: [] });
        renderRecipes();
    }

    function deleteRecipe(rIndex) { if(confirm('ลบสูตรนี้ใช่ไหม?')) { cogsData.recipes.splice(rIndex, 1); renderRecipes(); } }

    function addIngredient(rIndex) {
        cogsData.recipes[rIndex].ingredients.push({ matId: '', usedQty: 0 });
        renderRecipes();
    }

    function updateIngredient(rIndex, iIndex, field, value) {
        cogsData.recipes[rIndex].ingredients[iIndex][field] = field === 'matId' ? value : parseFloat(value) || 0;
        renderRecipes();
    }

    function deleteIngredient(rIndex, iIndex) {
        cogsData.recipes[rIndex].ingredients.splice(iIndex, 1);
        renderRecipes();
    }

    async function saveData() {
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader').innerText = 'กำลังบันทึกข้อมูลร้านไก่...';
        try {
            // ลบของเก่าออกก่อน (ถ้ามี) แล้ว Insert ใหม่เข้าตาราง cogs_settings
            await _supabase.from('cogs_settings').delete().neq('id', 0); 
            const { error } = await _supabase.from('cogs_settings').insert([{ config_json: cogsData }]);
            if (error) throw error;
            alert('บันทึกข้อมูลต้นทุนร้านไก่เรียบร้อยครับ!');
        } catch (e) { alert('ผิดพลาด: ' + e.message); }
        finally { document.getElementById('loader').style.display = 'none'; }
    }

    async function sendTelegramReport() {
        let msg = `📊 รายงานสรุปต้นทุน-กำไร [ร้านข้าวยำไก่]\n--------------------------`;
        cogsData.recipes.forEach(r => {
            let tCost = 0;
            r.ingredients.forEach(ing => {
                const mat = cogsData.materials.find(m => m.id === ing.matId);
                tCost += mat ? (mat.cost / mat.qty * ing.usedQty) : 0;
            });
            const profit = r.price - tCost;
            const margin = r.price > 0 ? ((profit/r.price)*100).toFixed(1) : 0;
            msg += `\n🍗 ${r.name}\n   - ราคาขาย: ${r.price} บ.\n   - ต้นทุน: ${tCost.toFixed(2)} บ.\n   - กำไร: ${profit.toFixed(2)} บ. (${margin}%)\n`;
        });
        msg += `\n--------------------------\nอัปเดตเมื่อ: ${new Date().toLocaleString('th-TH')}`;

        const send = (id) => fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ chat_id: id, text: msg })
        });

        try {
            await Promise.all([send(CHAT_ID), send(GROUP_CHAT_ID)]);
            alert('ส่งรายงานเข้า Telegram เรียบร้อยแล้วครับ!');
        } catch (e) { alert('ส่ง Telegram ไม่สำเร็จ'); }
    }

    loadData();
</script>

</body>
</html>
