<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHICKEN COPY - Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #d32f2f;
            --success-color: #2e7d32;
            --delivery-color: #0288d1;
            --warning-color: #ef6c00;
            --bg-color: #f4f4f4;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 480px; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            text-align: center;
        }

        h2 { color: var(--primary-color); margin-bottom: 20px; }

        /* รายการออเดอร์ลูกค้า */
        .order-item {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            text-align: left;
            border-left: 8px solid var(--warning-color);
            position: relative;
        }

        /* สีตามสถานะ */
        .order-item.status-done { border-left-color: var(--success-color); }
        .order-item.status-delivery { border-left-color: var(--delivery-color); }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .badge-cooking { background: #fff3e0; color: var(--warning-color); }
        .badge-done { background: #e8f5e9; color: var(--success-color); }
        .badge-out { background: #e1f5fe; color: var(--delivery-color); }

        .customer-info { font-size: 0.9em; color: #666; margin-bottom: 5px; }
        .order-details { font-size: 1em; color: #333; font-weight: 400; line-height: 1.4; }

        /* Admin UI */
        #admin-ui { display: none; width: 100%; border-top: 2px dashed #ccc; padding-top: 20px; margin-top: 20px; }
        
        .admin-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-action {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            font-family: 'Kanit'; font-weight: 600; cursor: pointer; color: white;
            font-size: 0.9em;
        }

        .admin-card {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white; font-family: 'Kanit'; font-weight: 600; cursor: pointer;
            position: relative; z-index: 10;
        }
        .btn-cooking { background: var(--warning-color); }
        .btn-done { background: var(--success-color); }

        .back-link { text-decoration: none; color: #888; font-size: 0.9em; margin-top: 15px; display: block; }

        #secret-trigger {
            margin-top: 60px;
            color: #ddd;
            font-size: 0.7em;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="customer-ui" class="card">
        <h2>📍 ติดตามออเดอร์ ไก่ก๊อปปี้</h2>
        <div id="order-list">กำลังตรวจสอบออเดอร์ของคุณ...</div>
        <a href="index.html" class="back-link">← กลับไปหน้าสั่งอาหาร</a>
    </div>

    <div id="admin-ui">
        <h2 style="text-align:center; color:#333; margin-bottom: 10px;">👨‍🍳 ระบบหลังบ้าน</h2>
        
        <div class="admin-actions">
            <button class="btn-action" style="background:#ff9800;" onclick="clearDoneOrders()">🧹 ล้างที่เสร็จแล้ว</button>
            <button class="btn-action" style="background:#d32f2f;" onclick="clearAllOrders()">🗑️ ล้างทั้งหมด</button>
        </div>

        <div id="admin-order-list"></div>
    </div>
</div>

<div id="secret-trigger">CHICKEN COPY SYSTEM v1.5</div>

<script>
    const SUPABASE_URL = 'https://bnovmyobcthvvtlgjzbm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJub3ZteW9iY3RodnZ0bGdqemJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjc2NDksImV4cCI6MjA5MTk0MzY0OX0.zjjZXW8mU4wN2OQwqZjD-IWL1PwZp7dM3oVsR5EwcCk';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ดึงข้อมูลลูกค้าจาก LocalStorage
    const myName = localStorage.getItem('customerName') || "";
    const myPhone = localStorage.getItem('customerPhone') || "";

    // ฟังก์ชันช่วยเซ็นเซอร์เบอร์โทร
    function maskPhone(phone) {
        if(!phone) return "---";
        if(phone.length < 10) return phone;
        return phone.substring(0, 3) + "XXX XXX";
    }

    async function refreshOrders() {
        const { data: orders, error } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
        if (error) {
            console.error(error);
            return;
        }

        const now = new Date().getTime();

        // 1. กรองออเดอร์ของลูกค้าคนนี้
        const myOrders = orders.filter(o => {
            const isMyOrder = (myName !== "" && o.customer_name === myName) || (myPhone !== "" && o.customer_phone === myPhone);
            if (!isMyOrder) return false;

            // กรองทิ้งถ้าสถานะคือ done และเวลาผ่านไปเกิน 1 ชั่วโมง (3600000 milliseconds)
            if (o.status === 'done') {
                const orderTime = new Date(o.created_at).getTime();
                if (now - orderTime > 3600000) {
                    return false; // ซ่อนออเดอร์นี้
                }
            }
            return true;
        }).slice(0, 5);

        const listDiv = document.getElementById('order-list');
        
        if (myOrders.length === 0) {
            listDiv.innerHTML = `<p style="color:#999;">ไม่พบออเดอร์ล่าสุดของคุณ<br><small>กรุณาสั่งอาหารก่อนนะครับ</small></p>`;
        } else {
            listDiv.innerHTML = myOrders.map(o => {
                let statusText = "👨‍🍳 กำลังเตรียมอาหาร";
                let statusClass = "badge-cooking";
                let itemClass = "";

                if (o.status === 'done') {
                    if (o.delivery_type === 'delivery') {
                        statusText = "🛵 กำลังออกไปส่ง";
                        statusClass = "badge-out";
                        itemClass = "status-delivery";
                    } else {
                        statusText = "✅ อาหารเสร็จแล้ว (มารับได้เลย)";
                        statusClass = "badge-done";
                        itemClass = "status-done";
                    }
                }

                return `
                    <div class="order-item ${itemClass}">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        <div class="customer-info">คุณ ${o.customer_name} (${maskPhone(o.customer_phone)})</div>
                        <div class="order-details">${o.order_details}</div>
                    </div>
                `;
            }).join('');
        }

        // 2. แสดงฝั่ง Admin (ถ้าเปิดอยู่)
        if (document.getElementById('admin-ui').style.display === 'block') {
            const adminList = document.getElementById('admin-order-list');
            if(orders.length === 0) {
                adminList.innerHTML = `<p style="text-align:center; color:#888;">ว่างเปล่า ไม่มีออเดอร์ค้าง</p>`;
            } else {
                adminList.innerHTML = orders.slice(0, 50).map(o => `
                    <div class="admin-card">
                        <strong>${o.customer_name}</strong> - ${o.customer_phone || 'ไม่มีเบอร์'}<br>
                        <small>ประเภท: ${o.delivery_type === 'delivery' ? '🛵 ส่งถึงที่' : '🏠 รับเอง'} | สถานะ: ${o.status === 'done' ? '✅' : '👨‍🍳'}</small><br>
                        <div style="margin-top:5px; margin-bottom:10px;">${o.order_details}</div>
                        <div class="btn-group">
                            <button class="btn btn-cooking" onclick="updateStatus('${o.id}', 'cooking')">กำลังทำ</button>
                            <button class="btn btn-done" onclick="updateStatus('${o.id}', 'done')">เสร็จแล้ว</button>
                        </div>
                    </div>
                `).join('');
            }
        }
    }

    // อัปเดตสถานะ
    async function updateStatus(id, newStatus) {
        try {
            const { error } = await _supabase.from('orders').update({ status: newStatus }).eq('id', id);
            if (error) throw error;
            refreshOrders();
        } catch(e) {
            alert("Error: " + e.message);
        }
    }

    // ฟังก์ชันล้างเฉพาะออเดอร์ที่ 'done' แล้ว
    async function clearDoneOrders() {
        if(!confirm('ยืนยันลบออเดอร์ที่ "เสร็จแล้ว" ทั้งหมดใช่ไหม?')) return;
        try {
            const { error } = await _supabase.from('orders').delete().eq('status', 'done');
            if (error) throw error;
            refreshOrders();
        } catch(e) {
            alert("ลบไม่ได้: " + e.message);
        }
    }

    // ฟังก์ชันล้างออเดอร์ทั้งหมด
    async function clearAllOrders() {
        if(!confirm('⚠️ ยืนยันการ "ล้างออเดอร์ทั้งหมด" ในระบบ? (ลบจริง กู้ไม่ได้นะ)')) return;
        try {
            const { data, error: fetchError } = await _supabase.from('orders').select('id');
            if (fetchError) throw fetchError;
            
            if (data && data.length > 0) {
                const ids = data.map(o => o.id);
                const { error: deleteError } = await _supabase.from('orders').delete().in('id', ids);
                if (deleteError) throw deleteError;
            }
            refreshOrders();
        } catch(e) {
            alert("ลบไม่ได้: " + e.message);
        }
    }

    // Real-time Update
    _supabase.channel('orders-channel').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, refreshOrders).subscribe();

    // ระบบกดค้าง (0420)
    let timer;
    const trigger = document.getElementById('secret-trigger');

    function handleStart() {
        timer = setTimeout(() => {
            const pwd = prompt("ระบุรหัสพนักงาน:");
            if (pwd === "0420") {
                document.getElementById('admin-ui').style.display = 'block';
                refreshOrders();
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }, 2000);
    }

    function handleEnd() { clearTimeout(timer); }

    trigger.addEventListener('touchstart', handleStart);
    trigger.addEventListener('touchend', handleEnd);
    trigger.addEventListener('mousedown', handleStart);
    trigger.addEventListener('mouseup', handleEnd);

    refreshOrders();
</script>

</body>
</html>
